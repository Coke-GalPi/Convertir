{% extends "base.html" %}

{% block title %}
Image Converter
{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl px-6 py-12">
    <div class="overflow-hidden rounded-3xl bg-white shadow-2xl ring-1 ring-slate-200">

        <!-- Header -->
        <div class="bg-gradient-to-r from-orange-400 to-amber-500 p-6">
            <h2 class="text-3xl font-bold text-black">
                Conversor de Imágenes
            </h2>
            <p class="mt-2 text-orange-50 ">
                Convierte tus imágenes al formato que necesites.
            </p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <form action="{{ url_for('public.convert') }}" method="POST" enctype="multipart/form-data" class="space-y-6">

                <!-- Archivo -->
                <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-700">
                        Selecciona una imagen
                    </label>
                    <div class="items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 p-8 text-center transition hover:border-orange-400 hover:bg-orange-50">
                        <input type="file" id="file" name="file" accept="image/*" class="block w-full cursor-pointer text-sm text-slate-600
                            file:mr-4 file:rounded-full file:border-0
                            file:bg-orange-400 file:px-4 file:py-2
                            file:font-semibold file:text-black
                            hover:file:bg-orange-500">
                        <p class="mt-3 text-sm text-slate-500">
                            PNG, JPG, WEBP, GIF, ICO
                        </p>
                    </div>
                </div>

                <!-- Formato -->
                <div>
                    <label for="description" class="mb-2 block text-sm font-semibold text-slate-700">Formato de
                        salida</label>
                    <select id="output_format" name="output_format"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 shadow-sm transition focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-200">
                        <option value="">Selecciona un formato</option>
                        <option value="webp">WEBP</option>
                        <option value="png">PNG</option>
                        <option value="jpg">JPG</option>
                        <option value="gif">GIF</option>
                        <option value="ico">ICO</option>
                        <option value="pdf">PDF</option>
                    </select>
                </div>

                <!-- Botón -->
                <button type="submit"
                    class="w-full rounded-xl bg-orange-400 px-6 py-4 text-lg font-bold text-black shadow-lg shadow-orange-500/40 transition-all duration-300 hover:-translate-y-1 hover:bg-orange-500 hover:shadow-xl hover:shadow-orange-500/60">
                    Convertir Imagen
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
